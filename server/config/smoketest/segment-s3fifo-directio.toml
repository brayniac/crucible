# Smoketest: segment backend with s3fifo eviction and Direct I/O disk tier

[workers]
threads = 2

[cache]
backend = "segment"
policy = "s3fifo"
heap_size = "8MB"
segment_size = "1MB"
max_value_size = "64KB"
hashtable_power = 14

[cache.disk]
enabled = true
path = "/tmp/crucible-smoketest-directio.dat"
size = "8MB"
io_backend = "directio"
promotion_threshold = 2

[[listener]]
protocol = "resp"
address = "127.0.0.1:6379"

[metrics]
address = "127.0.0.1:9090"
